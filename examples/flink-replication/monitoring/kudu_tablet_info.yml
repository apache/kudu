# json_exporter config — maps Kudu tablet IDs to table names.
#
# json_exporter probes the Kudu tserver JSON metrics endpoint
# (http://<tserver>:<port>/metrics?types=tablet) and exposes a
# kudu_tablet_info metric with tablet_id, table_name, and table_id labels.
# Prometheus then uses this to join tablet-level metrics with table names.
#
# Note: json_exporter automatically appends "_info" to object-type metric
# names, so "name: kudu_tablet" produces the metric "kudu_tablet_info".

modules:
  default:
    metrics:
      - name: kudu_tablet
        type: object
        path: "{[?(@.type=='tablet')]}"
        labels:
          tablet_id: "{.id}"
          table_name: "{.attributes.table_name}"
          table_id: "{.attributes.table_id}"
        values:
          info: "1"
